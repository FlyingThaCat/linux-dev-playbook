# Install Flatpak
- name: Install Flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present

# Add Flathub repository
- name: Add Flathub repository
  become: true
  ansible.builtin.command:
    cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# Install Anydesk
- name: Install anydesk via Flatpak
  become: true
  ansible.builtin.command:
    cmd: flatpak install -y flathub com.anydesk.Anydesk
  register: anydesk_install
  changed_when: "'Installing' in  anydesk_install.stdout"

# Verify installation
- name: Check anydesk installation
  ansible.builtin.command:
    cmd: flatpak info com.anydesk.Anydesk
  register: anydesk_check
  changed_when: false

- name: Display anydesk info
  ansible.builtin.debug:
    msg: "{{ anydesk_check.stdout }}"
