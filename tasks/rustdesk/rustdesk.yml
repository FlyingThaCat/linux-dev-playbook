# Install Flatpak
- name: Install Flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present

# Add Flathub repository
- name: Add Flathub repository
  become: true
  ansible.builtin.command:
    cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# Install RustDesk
- name: Install RustDesk via Flatpak
  become: true
  ansible.builtin.command:
    cmd: flatpak install -y flathub com.rustdesk.RustDesk
  register: rustdesk_install
  changed_when: "'Installing' in discord_install.stdout"

# Verify installation
- name: Check rustdesk installation
  ansible.builtin.command:
    cmd: flatpak info com.rustdesk.RustDesk
  register: rustdesk_check
  changed_when: false

- name: Display rustdesk info
  ansible.builtin.debug:
    msg: "{{ rustdesk_check.stdout }}"
