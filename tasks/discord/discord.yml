# Install Flatpak
- name: Install Flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present

# Add Flathub repository
- name: Add Flathub repository
  become: true
  ansible.builtin.command:
    cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# Install Discord
- name: Install Discord via Flatpak
  become: true
  ansible.builtin.command:
    cmd: flatpak install -y flathub com.discordapp.Discord
  register: discord_install
  changed_when: "'Installing' in discord_install.stdout"

# Verify installation
- name: Check Discord installation
  ansible.builtin.command:
    cmd: flatpak info com.discordapp.Discord
  register: discord_check
  changed_when: false

- name: Display Discord info
  ansible.builtin.debug:
    msg: "{{ discord_check.stdout }}"
