- name: Install Google Chrome on Debian
  ansible.builtin.import_tasks: debian.yml
  when: ansible_facts.os_family == "Debian"

- name: Install Google Chrome on RedHat
  ansible.builtin.import_tasks: redhat.yml
  when: ansible_facts.os_family == "RedHat"

- name: Install Google Chrome on Archlinux
  ansible.builtin.import_tasks: arch.yml
  when: ansible_facts.os_family == "Archlinux"

- name: Check if Google Chrome is successfully installed
  ansible.builtin.command: google-chrome --version
  register: google_chrome_status
  changed_when: false

- name: Display Google Chrome version
  ansible.builtin.debug:
    msg: "Google Chrome version: {{ google_chrome_status.stdout }}"
