# Install Flatpak
- name: Install Flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present

# Add Flathub repository
- name: Add Flathub repository
  become: true
  ansible.builtin.command:
    cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# Install Termius
- name: Install Termius via Flatpak
  become: true
  ansible.builtin.command:
    cmd: flatpak install -y flathub com.termius.Termius
  register: termius_install
  changed_when: "'Installing' in termius_install.stdout"

# Verify installation
- name: Check Termius installation
  ansible.builtin.command:
    cmd: flatpak info com.termius.Termius
  register: termius_check
  changed_when: false

- name: Display Termius info
  ansible.builtin.debug:
    msg: "{{ termius_check.stdout }}"
