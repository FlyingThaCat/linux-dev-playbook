# Install Flatpak
- name: Install Flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present

# Add Flathub repository
- name: Add Flathub repository
  become: true
  ansible.builtin.command:
    cmd: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# Install localsend
- name: Install localsend via Flatpak
  become: true
  ansible.builtin.command:
    cmd: flatpak install -y flathub org.localsend.localsend_app
  register: localsend_install
  changed_when: "'Installing' in localsend_install.stdout"

# Verify installation
- name: Check localsend installation
  ansible.builtin.command:
    cmd: flatpak info org.localsend.localsend_app
  register: localsend_check
  changed_when: false

- name: Display localsend info
  ansible.builtin.debug:
    msg: "{{ localsend_check.stdout }}"
