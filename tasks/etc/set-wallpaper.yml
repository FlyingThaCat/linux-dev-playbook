- name: Ensure Pictures directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Pictures"
    state: directory
    mode: '0755'

- name: Download wallpaper
  ansible.builtin.get_url:
    url: "{{ wallpaper_url }}"
    dest: "{{ ansible_env.HOME }}/Pictures/wallpaper.jpg"
    mode: '0644'

- name: Set wallpaper (GNOME)
  ansible.builtin.shell: |
    gsettings set org.gnome.desktop.background picture-uri "file://{{ ansible_env.HOME }}/Pictures/wallpaper.jpg"
    gsettings set org.gnome.desktop.background picture-uri-dark "file://{{ ansible_env.HOME }}/Pictures/wallpaper.jpg"
  environment:
    DISPLAY: ":0"
  when: ansible_env.XDG_CURRENT_DESKTOP is search("GNOME")
  changed_when: true

- name: Set wallpaper (KDE)
  ansible.builtin.shell: |
    plasma-apply-wallpaperimage "{{ ansible_env.HOME }}/Pictures/wallpaper.jpg"
  when: ansible_env.XDG_CURRENT_DESKTOP is search("KDE")
  changed_when: true
